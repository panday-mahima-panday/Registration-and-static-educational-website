<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@200..1000&display=swap" rel="stylesheet">

</head>

<body>

<div class="form-container">

<div class="header">
<h1>REGISTRATION FORM</h1>
</div>

<form class="form" id="form">

<div class="form-control">
<label>Username</label>
<input type="text" id="username" placeholder="Enter Your Full Name">
<i class="fa-solid fa-circle-check"></i>
<i class="fa-solid fa-circle-exclamation"></i>
<small>Error message</small>
</div>

<div class="form-control">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email">
<i class="fa-solid fa-circle-check"></i>
<i class="fa-solid fa-circle-exclamation"></i>
<small>Error message</small>
</div>

<div class="form-control">
<label>Phone Number</label>
<input type="number" id="phonenumber" placeholder="Enter phone number">
<i class="fa-solid fa-circle-check"></i>
<i class="fa-solid fa-circle-exclamation"></i>
<small>Error message</small>
</div>

<div class="form-control">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password">
<i class="fa-solid fa-circle-check"></i>
<i class="fa-solid fa-circle-exclamation"></i>
<small>Error message</small>
</div>

<div class="form-control">
<label>Confirm Password</label>
<input type="password" id="cpassword" placeholder="Enter password again">
<i class="fa-solid fa-circle-check"></i>
<i class="fa-solid fa-circle-exclamation"></i>
<small>Error message</small>
</div>

<input type="submit" value="Submit" class="btn">

<div class="form-control">
<label>Click the button below</label>
<button type="button" id="openBtn" class="btn">Open Window</button>
</div>

<div class="form-control">
<label style="color:blue">Click the button below</label>
<button type="button" id="colorBtn" class="btn">Change Background</button>
</div>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
